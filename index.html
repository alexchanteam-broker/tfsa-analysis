<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alex Chan | TFSA & RRSP 個人稅務帳戶收益分析</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&family=Noto+Sans+SC:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans TC', 'Noto Sans SC', sans-serif; background-color: #f1f5f9; }
        .glass { background: rgba(255, 255, 255, 0.98); backdrop-filter: blur(12px); }
        .loading-bar { width: 0%; height: 4px; background: #3b82f6; transition: width 0.4s ease-out; }
        .lang-btn-active { background-color: #3b82f6; color: white; }
        .chart-container { position: relative; height: 260px; width: 100%; }
        @keyframes fadeInScale { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        .modal-animate { animation: fadeInScale 0.3s ease-out forwards; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="max-w-md w-full glass rounded-[2.5rem] shadow-2xl overflow-hidden border border-gray-200 relative flex flex-col">
        
        <!-- 語言切換 -->
        <div class="bg-gray-100 border-b border-gray-200 px-6 py-2 flex justify-end items-center">
            <div class="flex bg-gray-200 p-1 rounded-full text-[11px] font-bold shadow-sm">
                <button id="btn-tc" onclick="setLanguage('tc')" class="px-4 py-1 rounded-full transition-all lang-btn-active">繁</button>
                <button id="btn-sc" onclick="setLanguage('sc')" class="px-4 py-1 rounded-full transition-all">简</button>
            </div>
        </div>

        <!-- Header -->
        <div class="bg-slate-900 p-8 text-center text-white">
            <div id="ui-header-tag" class="text-blue-400 font-black tracking-widest text-[10px] mb-2 uppercase italic leading-tight">Alex Chan | Individual Insurance Broker</div>
            <h1 id="ui-title" class="text-2xl font-black italic text-yellow-400 tracking-tight">個人稅務帳戶收益分析</h1>
            <div id="ui-subtitle" class="text-[10px] opacity-60 mt-2 italic tracking-widest">個人稅務帳戶收益分析系統</div>
        </div>

        <!-- 第一步：輸入表單 -->
        <div id="step-form" class="p-8 space-y-5">
            <div class="text-center">
                <p id="ui-quote" class="text-slate-500 text-sm italic font-bold leading-relaxed">「透過精確的稅務帳戶分析，優化您的個人資產收益空間。」</p>
            </div>
            
            <div class="space-y-4">
                <div>
                    <label id="ui-label-name" class="block text-[10px] font-bold text-slate-400 uppercase mb-1 ml-1 tracking-widest">您的稱呼</label>
                    <input id="user-name" type="text" placeholder="例如：Chris" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none text-sm transition-all">
                </div>
                
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label id="ui-label-acc-type" class="block text-[10px] font-bold text-slate-400 uppercase mb-1 ml-1 tracking-widest">帳戶類型</label>
                        <select id="account-type" onchange="updateLabelByAccount()" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none text-sm cursor-pointer">
                            <option value="TFSA">TFSA</option>
                            <option value="RRSP">RRSP</option>
                        </select>
                    </div>
                    <div>
                        <label id="ui-label-type" class="block text-[10px] font-bold text-slate-400 uppercase mb-1 ml-1 tracking-widest">目前存放方式</label>
                        <select id="asset-type" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none text-sm cursor-pointer">
                            <option value="cash">銀行定期 / GIC</option>
                            <option value="fund">互惠基金 (無保證)</option>
                            <option value="stock">藍籌股 (無保證)</option>
                        </select>
                    </div>
                </div>

                <div>
                    <label id="ui-label-balance" class="block text-[10px] font-bold text-slate-400 uppercase mb-1 ml-1 tracking-widest">累積供款額度 (CAD)</label>
                    <input id="balance" type="number" placeholder="例如: 109000" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none text-sm transition-all">
                </div>
            </div>

            <button onclick="startAnalysis()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-black py-4 rounded-2xl shadow-xl transition-all transform active:scale-95 flex items-center justify-center mt-6">
                <span id="ui-btn-scan">⚡ 啟動 AI 收益深度分析</span>
            </button>
        </div>

        <!-- 第二步：載入中 -->
        <div id="step-loading" class="hidden p-16 text-center space-y-8">
            <div class="w-16 h-16 border-4 border-blue-600 border-t-transparent rounded-full animate-spin mx-auto"></div>
            <h3 id="ui-loading-title" class="text-xl font-black text-slate-800">AI 正在分析帳戶收益...</h3>
            <div class="w-full bg-gray-100 rounded-full h-1.5 overflow-hidden">
                <div id="progress-bar" class="loading-bar"></div>
            </div>
            <p id="loading-hint" class="text-[10px] text-slate-400 italic">正在優化個人稅務收益路徑...</p>
        </div>

        <!-- 第三步：分析結果 -->
        <div id="step-result" class="hidden flex flex-col h-[650px] bg-white">
            <div class="p-6 space-y-6 flex-grow overflow-y-auto">
                <div class="flex items-center justify-between text-blue-600 border-b border-blue-50 pb-3">
                    <span id="ui-result-header" class="font-black text-sm italic tracking-widest">稅務帳戶收益分析結果</span>
                </div>
                <div class="bg-slate-50 p-4 rounded-3xl border border-slate-100 shadow-inner text-center">
                    <h4 class="text-[10px] font-black text-slate-400 mb-4 uppercase tracking-widest italic text-center">17年預期累積收益對比</h4>
                    <div class="chart-container"><canvas id="wealthChart"></canvas></div>
                </div>
                <div id="report-content" class="text-slate-700 leading-relaxed text-[15px] space-y-4 px-2 italic"></div>
                <div class="p-5 bg-blue-50 rounded-3xl border border-blue-100 mb-4">
                    <p class="text-blue-700 text-[11px] leading-relaxed italic font-medium">建議考慮配置具備「專業管理」與「保證機制」的收益組合，在免稅空間內實現個人長期收益最大化。</p>
                </div>
            </div>
            <div class="p-6 bg-slate-900 text-white text-center flex-shrink-0 space-y-3">
                <a id="cta-wa-link" href="#" target="_blank" class="w-full bg-[#25D366] text-white font-black py-4 rounded-xl flex items-center justify-center no-underline shadow-lg active:scale-95 transition-all">
                    WhatsApp 聯繫顧問詳談
                </a>
                <button onclick="resetApp()" class="w-full bg-slate-700 text-white font-bold py-3 rounded-xl flex items-center justify-center active:scale-95 transition-all text-sm">
                    ↺ 重新開始分析
                </button>
            </div>
        </div>
    </div>

    <!-- 訊息提示彈窗 -->
    <div id="msg-modal" class="fixed inset-0 bg-black/70 z-[200] hidden items-center justify-center p-6 backdrop-blur-md">
        <div class="bg-white p-8 rounded-[2.5rem] max-w-xs w-full text-center shadow-2xl modal-animate border border-slate-100">
            <div class="text-5xl mb-4">⚠️</div>
            <h3 class="text-lg font-black text-slate-900 mb-2">系統提示</h3>
            <p id="msg-text" class="text-slate-500 text-sm mb-6 leading-relaxed italic text-left"></p>
            <button onclick="closeMsg()" class="w-full bg-slate-900 text-white py-3 rounded-xl font-bold active:scale-95 transition-transform">了解</button>
        </div>
    </div>

    <script>
        // 注意：此 API Key 已在 Google Cloud 控制台設定網域限制 (Domain Restriction)，僅能在特定網址下運行。
        const apiKey = "AIzaSyCx5OJu8NnZhNSsh1e0-6iKkW-mpUUAG0o"; 

        let currentLang = 'tc';
        let wealthChart = null;
        const rates = { cash: 0.020, fund: 0.045, stock: 0.060, alex: 0.110 };

        function showMsg(text) {
            document.getElementById('msg-text').innerHTML = text;
            document.getElementById('msg-modal').classList.remove('hidden');
            document.getElementById('msg-modal').classList.add('flex');
        }

        function closeMsg() {
            document.getElementById('msg-modal').classList.add('hidden');
            document.getElementById('msg-modal').classList.remove('flex');
        }

        function setLanguage(lang) {
            currentLang = lang;
            updateLabelByAccount();
            document.getElementById('btn-tc').classList.toggle('lang-btn-active', lang === 'tc');
            document.getElementById('btn-sc').classList.toggle('lang-btn-active', lang === 'sc');
        }

        function updateLabelByAccount() {
            const accType = document.getElementById('account-type').value;
            const label = document.getElementById('ui-label-balance');
            label.innerText = accType === 'TFSA' ? (currentLang === 'tc' ? "CRA 累積供款額度 (CAD)" : "CRA 累计供款额度 (CAD)") : (currentLang === 'tc' ? "RRSP 扣稅額度 (CAD)" : "RRSP 扣税额度 (CAD)");
        }

        function resetApp() {
            document.getElementById('step-result').classList.add('hidden');
            document.getElementById('step-form').classList.remove('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        async function fetchAIResponse(prompt, key) {
            const trimmedKey = key.trim();
            const attempts = [
                { ver: "v1beta", model: "gemini-1.5-flash-8b" },
                { ver: "v1beta", model: "gemini-1.5-flash" },
                { ver: "v1", model: "gemini-1.5-flash" }
            ];

            let lastErr = "";
            for (let i = 0; i < attempts.length; i++) {
                const config = attempts[i];
                try {
                    document.getElementById('loading-hint').innerText = `正在連接 AI 分析路徑 (Step ${i+1})...`;
                    const url = `https://generativelanguage.googleapis.com/${config.ver}/models/${config.model}:generateContent?key=${trimmedKey}`;
                    
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                    });

                    const data = await response.json();
                    if (data.candidates && data.candidates[0].content && data.candidates[0].content.parts[0].text) {
                        return data.candidates[0].content.parts[0].text;
                    }
                    if (data.error) lastErr = data.error.message;
                } catch (e) {
                    lastErr = e.message;
                }
                await new Promise(r => setTimeout(r, 500));
            }
            throw new Error(lastErr || "API 無回應");
        }

        async function startAnalysis() {
            const nameInput = document.getElementById('user-name').value.trim();
            const name = nameInput || "客戶";
            const balanceVal = document.getElementById('balance').value;
            const balance = parseFloat(balanceVal);

            if(isNaN(balance)) {
                showMsg("請輸入正確的額度數據。");
                return; 
            }

            document.getElementById('step-form').classList.add('hidden');
            document.getElementById('step-loading').classList.remove('hidden');
            document.getElementById('progress-bar').style.width = "40%";

            const accType = document.getElementById('account-type').value;
            const assetType = document.getElementById('asset-type').value;
            const finalCurrent = balance * Math.pow(1 + rates[assetType], 17);
            const finalAlex = balance * Math.pow(1 + rates.alex, 17);
            const gap = finalAlex - finalCurrent;

            const msg = `你好！我係 ${name}，我剛剛完成了個人稅務帳戶收益分析 (${accType})，想諮詢關於專業配置的細節建議。`;
            document.getElementById('cta-wa-link').href = `https://wa.me/17783198129?text=${encodeURIComponent(msg)}`;

            const promptText = `
                你是一位專業理財顧問的助手，負責「個人稅務帳戶收益分析系統」。
                請為 ${name} 寫一份 180 字廣東話分析。
                背景：他在 ${accType} 有 $${balance.toLocaleString()}，目前配置是 ${assetType}。
                關鍵：若轉向「專業管理投資組合」，17 年後的預期收益差距高達 $${parseInt(gap).toLocaleString()}。
                要求：
                1. 用震撼的比喻（如買一輛超跑或置業首期）說明這筆免稅收益的價值。
                2. 指出留在傳統銀行低息戶口是嚴重浪費個人稅務帳戶的免稅增長空間。
                3. 強調「專業管理組合」與「增長保證」在個人財務規劃中的優勢。
                禁止使用『診斷』，統一用『分析』。不要過度提及個人姓名，重點放在「專業管理配置系統」。
            `;

            try {
                const aiText = await fetchAIResponse(promptText, apiKey);
                document.getElementById('report-content').innerHTML = aiText.replace(/\n/g, '<br>');
                
                document.getElementById('progress-bar').style.width = "100%";
                setTimeout(() => {
                    document.getElementById('step-loading').classList.add('hidden');
                    document.getElementById('step-result').classList.remove('hidden');
                    renderChart(finalCurrent, finalAlex, rates[assetType]);
                }, 800);

            } catch (e) { 
                console.error("AI Error:", e);
                const backupReport = `你好 ${name}，這是您的個人稅務帳戶收益精算簡報：<br><br>根據 17 年複利模擬，您的 ${accType} 帳戶目前正處於「收益受限」狀態。預計與「專業管理投資組合」的配置相比，您將面臨高達 <b>$${parseInt(gap).toLocaleString()}</b> 的收益缺口。這筆差額足夠讓您的退休生活品質產生質的飛躍。請立即點擊下方按鈕聯繫顧問獲取完整專業分析。`;
                document.getElementById('report-content').innerHTML = backupReport;
                
                setTimeout(() => {
                    document.getElementById('step-loading').classList.add('hidden');
                    document.getElementById('step-result').classList.remove('hidden');
                    renderChart(finalCurrent, finalAlex, rates[assetType]);
                }, 800);
            }
        }

        function renderChart(v1, v2, r1) {
            const ctx = document.getElementById('wealthChart').getContext('2d');
            if (wealthChart) wealthChart.destroy();
            wealthChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: ["目前策略", "專業管理配置"],
                    datasets: [{
                        data: [v1.toFixed(0), v2.toFixed(0)],
                        backgroundColor: ['#cbd5e1', '#3b82f6'],
                        borderRadius: 15,
                        barThickness: 50
                    }]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: { y: { display: false }, x: { grid: { display: false } } }
                },
                plugins: [{
                    id: 'valueLabel',
                    afterDraw: (chart) => {
                        const { ctx } = chart;
                        ctx.save(); ctx.textAlign = 'center'; ctx.font = 'bold 12px sans-serif';
                        const meta = chart.getDatasetMeta(0);
                        ctx.fillStyle = '#64748b'; ctx.fillText(`${(r1*100).toFixed(1)}% p.a.`, meta.data[0].x, meta.data[0].y - 12);
                        ctx.fillStyle = '#3b82f6'; ctx.fillText(`11.0% p.a.`, meta.data[1].x, meta.data[1].y - 12);
                        ctx.restore();
                    }
                }]
            });
        }

        window.onload = () => setLanguage('tc');
    </script>
</body>
</html>
