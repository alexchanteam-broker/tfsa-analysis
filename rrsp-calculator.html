<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RRSP & CCB 增幅計算器 | Alex Chan</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #f4f7f6; padding: 20px; color: #333; }
        .card { background: white; border-radius: 15px; padding: 25px; max-width: 500px; margin: auto; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { color: #2c3e50; text-align: center; font-size: 1.2rem; }
        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 0.9rem; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .result-box { background: #e8f4fd; padding: 15px; border-radius: 10px; margin-top: 20px; border-left: 5px solid #3498db; }
        .result-item { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 1rem; }
        .highlight { color: #e67e22; font-weight: bold; font-size: 1.2rem; }
        .total { border-top: 1px solid #ccc; padding-top: 10px; font-weight: bold; color: #27ae60; font-size: 1.3rem; }
        .footer { text-align: center; font-size: 0.8rem; color: #7f8c8d; margin-top: 20px; }
    </style>
</head>
<body>

<div class="card">
    <h2>💰 RRSP 節稅 & 牛奶金優化計算</h2>
    
    <div class="input-group">
        <label>家庭年收入 (Family Net Income):</label>
        <input type="number" id="income" value="100000" step="5000">
    </div>

    <div class="input-group">
        <label>18 歲以下小朋友人數:</label>
        <select id="kids">
            <option value="1">1 個</option>
            <option value="2" selected>2 個</option>
            <option value="3">3 個</option>
            <option value="4">4 個</option>
        </select>
    </div>

    <div class="input-group">
        <label>計劃投資 RRSP 金額:</label>
        <input type="number" id="rrsp" value="10000" step="1000">
    </div>

    <div class="result-box">
        <div class="result-item">
            <span>預算節省稅金 (BC省):</span>
            <span id="tax-savings" class="highlight">$0</span>
        </div>
        <div class="result-item">
            <span>預計額外增加牛奶金 (年):</span>
            <span id="ccb-gain" class="highlight">$0</span>
        </div>
        <div class="result-item total">
            <span>首年總現金回報:</span>
            <span id="total-return">$0</span>
        </div>
    </div>
    
    <div class="footer">
        *此計算僅供參考，實際金額以 CRA 評估為準。<br>
        聯絡 Alex Chan 獲取精確稅務分析。
    </div>
</div>

<script>
    function calculate() {
        const income = parseFloat(document.getElementById('income').value);
        const rrsp = parseFloat(document.getElementById('rrsp').value);
        const kids = parseInt(document.getElementById('kids').value);

        // 1. 估算 BC 省邊際稅率 (簡化版)
        let taxRate = 0.20;
        if (income > 110000) taxRate = 0.38;
        else if (income > 80000) taxRate = 0.31;
        else if (income > 50000) taxRate = 0.23;
        
        const taxSavings = rrsp * taxRate;

        // 2. 估算 CCB 回收率 (Clawback Rate)
        // 根據收入區間，每少 $1 收入可多攞返幾多 CCB
        let ccbRate = 0;
        if (income > 79000) {
            if (kids === 1) ccbRate = 0.032;
            else if (kids === 2) ccbRate = 0.057;
            else if (kids >= 3) ccbRate = 0.08;
        } else if (income > 36000) {
            if (kids === 1) ccbRate = 0.07;
            else if (kids === 2) ccbRate = 0.135;
            else if (kids >= 3) ccbRate = 0.19;
        }

        const ccbGain = rrsp * ccbRate;
        const total = taxSavings + ccbGain;

        document.getElementById('tax-savings').innerText = '$' + taxSavings.toLocaleString(undefined, {maximumFractionDigits: 0});
        document.getElementById('ccb-gain').innerText = '$' + ccbGain.toLocaleString(undefined, {maximumFractionDigits: 0});
        document.getElementById('total-return').innerText = '$' + total.toLocaleString(undefined, {maximumFractionDigits: 0});
    }

    document.querySelectorAll('input, select').forEach(el => {
        el.addEventListener('input', calculate);
    });

    calculate();
</script>

</body>
</html>
